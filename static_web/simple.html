<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Web page Deployment</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Favicon -->
  <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" />

  <style>
    body {
      background: linear-gradient(135deg, #1e3a8a, #2563eb, #3b82f6);
    }

    .stars {
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      animation: moveStars 40s linear infinite;
    }

    @keyframes moveStars {
      from { background-position: 0 0; }
      to { background-position: 1200px 1200px; }
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="stars text-white min-h-screen flex flex-col items-center justify-center px-6 py-12">

  <!-- Card -->
  <div class="fade-in backdrop-blur-xl bg-white/90 text-gray-900 shadow-2xl rounded-3xl p-10 max-w-2xl w-full text-center border border-white/30">

    <!-- Logo -->
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
         alt="GitHub Logo"
         class="w-20 h-20 mx-auto mb-5 animate-pulse" />

    <!-- Title -->
    <h1 class="text-4xl font-extrabold text-blue-600 mb-4">
      GitHub Actions Auto Deployment
    </h1>

    <!-- Description -->
    <p class="text-lg text-gray-700 mb-8 leading-relaxed">
      Deploy your static website automatically using
      <span class="text-blue-500 font-semibold">GitHub Actions</span>.
      Perfect for DevOps demos, CI/CD pipelines, and automation workflows.
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center">

      <!-- YouTube -->
      <a href="https://www.youtube.com/watch?v=0IDeXe9Zqns"
         target="_blank"
         aria-label="Watch on YouTube"
         class="inline-flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white text-lg font-semibold py-3 px-6 rounded-full transition duration-300 shadow-lg hover:scale-105">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-6 w-6 mr-2"
             fill="currentColor"
             viewBox="0 0 24 24">
          <path d="M23.498 6.186a2.956 2.956 0 00-2.082-2.088C19.61 3.5 12 3.5 12 3.5s-7.61 0-9.416.598A2.956 2.956 0 00.502 6.186 30.22 30.22 0 000 12a30.22 30.22 0 00.502 5.814 2.956 2.956 0 002.082 2.088C4.39 20.5 12 20.5 12 20.5s7.61 0 9.416-.598a2.956 2.956 0 002.082-2.088A30.22 30.22 0 0024 12a30.22 30.22 0 00-.502-5.814zM9.75 15.5v-7l6 3.5-6 3.5z"/>
        </svg>

        Watch Video
      </a>

      <!-- GitHub -->
      <a href="https://github.com/thangacodes"
         target="_blank"
         aria-label="Follow on GitHub"
         class="inline-flex items-center justify-center bg-gray-900 hover:bg-black text-white text-lg font-semibold py-3 px-6 rounded-full transition duration-300 shadow-lg hover:scale-105">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-6 w-6 mr-2"
             fill="currentColor"
             viewBox="0 0 24 24">
          <path d="M12 .5a12 12 0 00-3.79 23.4c.6.113.82-.26.82-.577v-2.22c-3.34.726-4.04-1.61-4.04-1.61a3.18 3.18 0 00-1.34-1.76c-1.1-.754.083-.738.083-.738a2.52 2.52 0 011.84 1.25 2.54 2.54 0 003.47.994c.05-.184.19-.31.34-.38-2.67-.305-5.48-1.336-5.48-5.95a4.66 4.66 0 011.24-3.23 4.32 4.32 0 01.12-3.19s1-.32 3.3 1.23a11.4 11.4 0 016 0c2.29-1.55 3.29-1.23 3.29-1.23a4.32 4.32 0 01.12 3.19 4.65 4.65 0 011.24 3.23c0 4.62-2.82 5.64-5.5 5.94.2.17.38.5.38 1v1.48c0 .32.21.7.83.57A12 12 0 0012 .5z"/>
        </svg>

        Follow on GitHub
      </a>

    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-10 text-center text-sm text-white/80">
    <p>
      Made with 💙 using GitHub Actions ·
      <a href="https://github.com/" class="underline hover:text-blue-200">
        View on GitHub
      </a>
    </p>

    <div class="flex justify-center gap-6 mt-3">
      <a href="https://twitter.com" target="_blank" aria-label="Twitter" class="hover:text-blue-300 transition">
        🐦
      </a>
      <a href="https://github.com" target="_blank" aria-label="GitHub" class="hover:text-gray-300 transition">
        💻
      </a>
    </div>
  </footer>

</body>
</html>
