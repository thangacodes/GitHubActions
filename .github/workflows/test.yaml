name: Test self hosted runner job

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  testjob:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Show working directory
        run: pwd
      - name: Show current user
        run: whoami
      - name: Echo message
        run: echo "Running on self-hosted runner"
